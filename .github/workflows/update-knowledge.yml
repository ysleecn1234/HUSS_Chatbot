name: HUSS 지식 베이스 자동 업데이트

on:
  schedule:
    # 4일마다 한국시간 오전 6시 (UTC 21시) 실행
    - cron: '0 21 */4 * *'
  workflow_dispatch: # 수동 실행도 가능

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 리포지토리 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests beautifulsoup4

      - name: 크롤링 실행
        run: python update_knowledge.py

      - name: 변경사항 확인 및 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet knowledge_dynamic.js index.html; then
            echo "변경사항 없음 — 커밋 건너뜀"
          else
            git add knowledge_dynamic.js index.html
            git commit -m "자동 업데이트: 지식 베이스 $(date +%Y-%m-%d)"
            git push
          fi
